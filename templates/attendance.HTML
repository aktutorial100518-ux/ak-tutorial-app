{% extends "base.html" %}
{% block title %}Attendance{% endblock %}

{% block content %}

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:auto;
margin-top:30px;
}

.box{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#34495e;
color:white;
padding:10px;
}

table td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

button{
padding:8px 12px;
background:#27ae60;
color:white;
border:none;
border-radius:4px;
}

input, select{
padding:8px;
}

</style>

</head>

<body>

<div class="header">
<h1>A.K. Tutorial - Attendance</h1>
</div>

<div class="container">

<div class="box">

<form method="POST">

Student ID
<input name="student_id">

Status
<select name="status">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>

<button type="submit">Add Attendance</button>

</form>

</div>

<div class="box">

<table>

<tr>
<th>ID</th>
<th>Student ID</th>
<th>Date</th>
<th>Status</th>
<th>Edit</th>
</tr>

{% for r in records %}

<tr>
<td>{{r[0]}}</td>
<td>{{r[1]}}</td>
<td>{{r[2]}}</td>
<td>{{r[3]}}</td>
<td>
<a href="/edit_attendance/{{r[0]}}" 
style="background:#f39c12; color:white; padding:6px 12px; border-radius:5px; text-decoration:none;">
Edit
</a>
</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
